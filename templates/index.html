<!DOCTYPE html>
<html>
<head>
    <title>{{ creature.name }}</title>
</head>
<body>
    <h1>{{ creature.name }}</h1>
    
    <p>Hunger: {{ creature.hunger }}</p>
    <p>Happiness: {{ creature.happiness }}</p>
    <p>Energy: {{ creature.energy }}</p>
    
    <button onclick="doAction('feed')">Feed</button>
    <button onclick="doAction('play')">Play</button>
    <button onclick="doAction('sleep')">Sleep</button>

    <script>
        function doAction(action) {
            fetch('/action/' + action)
                .then(response => response.json())
                .then(data => {
                    document.location.reload();
                });
        }
    </script>
</body>
</html>
